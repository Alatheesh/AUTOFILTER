<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Filter Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            max-width: 500px;
            width: 90%;
        }
        h1 { margin-top: 0; color: #38bdf8; }
        p { font-size: 1.1rem; line-height: 1.6; color: #cbd5e1; }
        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #10b981;
            color: white;
            border-radius: 50px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Auto-Filter Bot</h1>
        <p>Welcome to our high-performance, multi-sharded Telegram database system. </p>
        <p>The bot is currently indexing files and handling requests in the background.</p>
        <div class="status">🟢 Systems Online & Running</div>
    </div>
</body>
</html>
